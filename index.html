<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KALYANI MSCL REGISTRATION FORM</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background: #f8f9fa;
    }
    .form-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      animation: fadeIn 1s ease-in-out;
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: bold;
    }
    .form-grid {
      display: flex;
      gap: 20px;
    }
    .form-left { flex: 2; }
    .form-right { flex: 1; text-align: center; }
    .photo-box {
      width: 150px;
      height: 180px;
      border: 1px solid #ccc;
      margin: 0 auto 10px;
      background: #fafafa;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    button {
      min-width: 120px;
      font-weight: bold;
    }
    .btn-submit { background: #28a745; color: #fff; }
    .btn-clear { background: #dc3545; color: #fff; }
    #msg { margin-top: 15px; text-align: center; font-weight: bold; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>KALYANI MSCL REGISTRATION FORM</h2>
    <form id="playerForm" enctype="multipart/form-data">
      <div class="form-grid">
        <!-- Left Side -->
        <div class="form-left">
          <div class="form-group">
            <label>Group</label>
            <input type="text" class="form-control" name="Group" required>
          </div>
          <div class="form-group">
            <label>Serial Number</label>
            <input type="text" class="form-control" name="Serial Number" required>
          </div>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-control" name="Full Name" required>
          </div>
          <div class="form-group">
            <label>Nick Name</label>
            <input type="text" class="form-control" name="Nick Name">
          </div>
          <div class="form-group">
            <label>Age</label>
            <input type="number" class="form-control" name="Age" required>
          </div>
          <div class="form-group">
            <label>Address</label>
            <textarea class="form-control" name="Address"></textarea>
          </div>
          <div class="form-group">
            <label>Role</label>
            <select class="form-control" name="Role" required>
              <option value="">-- Select Role --</option>
              <option>Right Hand Batsman</option>
              <option>Left Hand Batsman</option>
              <option>Right Hand Bowler</option>
              <option>Left Hand Bowler</option>
              <option>All-rounder</option>
              <option>Wicket-Keeper</option>
              <option>Wicket-Keeper Batsman</option>
            </select>
          </div>
          <div class="form-group">
            <label>Base Price (₹)</label>
            <input type="number" class="form-control" name="Base Price" required>
          </div>
        </div>

        <!-- Right Side -->
        <div class="form-right">
          <div class="photo-box" id="photoPreview">
            <span>Preview</span>
          </div>
          <label>Upload Photo</label>
          <input type="file" class="form-control-file" name="media" id="media" accept="image/*">
        </div>
      </div>

      <!-- Buttons -->
      <div class="text-center mt-3">
        <button type="submit" class="btn btn-submit">Submit</button>
        <button type="reset" class="btn btn-clear">Clear Form</button>
      </div>
    </form>
    <div id="msg"></div>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycby6IZ51q7QUQNjkjYZWjjLXvRlbpaqWYPhZcHbiiP3O1hFtogex_U_65Uni8rBDO4Fa/exec";
    const form = document.getElementById("playerForm");
    const fileInput = document.getElementById("media");
    const photoPreview = document.getElementById("photoPreview");

    // 📷 Preview photo
    fileInput.addEventListener("change", () => {
      if (fileInput.files && fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
          photoPreview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
        };
        reader.readAsDataURL(fileInput.files[0]);
      } else {
        photoPreview.innerHTML = "<span>Preview</span>";
      }
    });

    // 📨 Submit form
    form.addEventListener("submit", e => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.innerText = "Submitting...";

      const formData = new FormData(form);

      if (fileInput.files.length > 0) {
        const reader = new FileReader();
        reader.onload = function() {
          formData.append("media", reader.result.split(",")[1]); // Base64
          submitForm(formData);
        };
        reader.readAsDataURL(fileInput.files[0]);
      } else {
        submitForm(formData);
      }
    });

    function submitForm(formData) {
      fetch(scriptURL, { method: "POST", body: formData })
        .then(res => res.json())
        .then(res => {
          if (res.result === "success") {
            document.getElementById("msg").innerText = "✅ Submitted successfully!";
            form.reset();
            photoPreview.innerHTML = "<span>Preview</span>";
          } else {
            document.getElementById("msg").innerText = "❌ Error: " + res.error;
          }
        })
        .catch(err => {
          document.getElementById("msg").innerText = "❌ Network error: " + err;
        });
    }
  </script>
</body>

</html>
